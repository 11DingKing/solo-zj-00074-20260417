version: "3"

volumes:
  mysqlstorage:

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./:/www
      - /www/node_modules
    ports:
      - ${PORT}:${PORT}
    command: "npm run start"
    environment:
      DB_URL: mysql
    links:
      - mysql
    depends_on:
      - mysql

  mysql:
    build:
      context: .
      dockerfile: mysql.dockerfile
      args:
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
    restart: always
    volumes:
      - mysqlstorage:/var/lib/mysql
    ports:
      - "3306:3306"
